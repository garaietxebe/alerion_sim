# Parámetros del nodo de validación
# Calcula el peso computacional total y el reparto por sistemas
validation_node:
  ros__parameters:

    model_name:      x500_0
    log_file:        /tmp/alerion_validation.csv   
    compute_csv:     /tmp/alerion_compute.csv      
    status_interval:  5.0   # cada cuanto imprime la situacion

 
    waypoints:  #desactivados, la validacion se tiene que hacer a mano -- en cuanto se haga el vuelo automatizado se aplicaran los waypoints
      - 0.0    
      - 0.0    #      (y)
      - 5.0    #      (z)
      - 1.0    #      (desvio tolerable)
      - 5.0    # 2
      - 0.0
      - 6.0
      - 1.5
      - 13.0   # 3
      - 0.0
      - 6.0
      - 1.5
      - 20.0   # 4
      - 0.0
      - 5.0
      - 1.5
      - 28.0   # 5
      - 0.0
      - 4.0
      - 2.0
      - 0.0    # 6
      - 0.0
      - 5.0
      - 1.5

    # CARGA COMPUTACIONAL  (psutil, transmitido a compute_csv cada 1/cpu_sample_hz s)
    cpu_sample_hz: 0.2    # 0.2 Hz = cada 5 segundos

    target_processes:
      - 'gz sim'
      - 'px4'
      - 'MicroXRCEAgent'
      - 'parameter_bridge'
      - 'image_bridge'
      - 'gimbal_controller'
      - 'validation_node'
