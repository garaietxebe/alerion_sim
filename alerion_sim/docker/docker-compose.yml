# Run all commands from this directory (alerion_sim/docker/).
#
# AMD (default) — override.yml is auto-loaded, no -f needed:
#   docker compose run --rm sim level:=full
#   docker compose run --rm sim level:=development sensor_profile:=vision
#   docker compose run --rm sim level:=development sensor_profile:=hard_vision
#   docker compose run --rm validate level:=full
#   docker compose run --rm rviz level:=full
#   docker compose run --rm qgc
#   docker compose run --rm shell
#
# NVIDIA — pass both files explicitly (-f suppresses auto-loading of override.yml):
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml run --rm sim level:=full
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml run --rm rviz level:=full
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml run --rm qgc
#
# For GUI services (sim / qgc) on Linux X11, run once before launching:
#   xhost +local:docker
#

# Shared environment (mapping format enables <<: merge key for per-service overrides)
x-env: &default-env
  DISPLAY: ${DISPLAY}
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  QT_QPA_PLATFORM: xcb
  GZ_VERSION: harmonic
  FASTRTPS_DEFAULT_PROFILES_FILE: /alerion_sim/docker/fastdds_localhost.xml

x-volumes: &default-volumes
  - ..:/alerion_sim
  - /tmp/.X11-unix:/tmp/.X11-unix

services:

  # Main simulation service: Gazebo + PX4 SITL + bridges + controllers
  #
  # ~/.gz is mounted as tmpfs (RAM-backed) instead of a named volume.
  # This guarantees a clean Gazebo state on every run — accumulated shader
  # caches, log files, and world state from previous runs cannot degrade RTF.
  # The tmpfs is wiped automatically when the container exits; no manual
  # cleanup is needed.  512 MB is ample for Gazebo Harmonic's shader cache.
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: alerion_sim:latest
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    environment:
      <<: *default-env
    volumes: *default-volumes
    tmpfs:
      - /root/.gz:size=512m

  # QGroundControl: connects to PX4 SITL via MAVLink UDP 14550 (auto-detected on host network)
  # Runs as qgcuser (non-root) to avoid the QGC root warning.
  qgc:
    image: alerion_sim:latest
    network_mode: host
    user: qgcuser
    environment:
      <<: *default-env
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - qgc_settings:/home/qgcuser/.config/QGroundControl.org
    entrypoint: ["/opt/QGroundControl/AppRun"]

  # Validation and compute load monitoring service
  # Runs alongside the sim container; shares its PID namespace to probe gz-sim, px4,
  # MicroXRCEAgent, and bridge resource usage.
  validate:
    image: alerion_sim:latest
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    environment: *default-env
    volumes: *default-volumes
    entrypoint: ["/bin/bash", "-c",
      "source /opt/ros/jazzy/setup.bash \
    && source /opt/px4_msgs_ws/install/setup.bash \
    && ros2 launch /alerion_sim/launch/validation.launch.py \"$@\"", "--"]

  # RViz2 visualisation — runs on the container GPU alongside the sim.
  # Receives topics over the host network; no PID namespace needed.
  rviz:
    image: alerion_sim:latest
    network_mode: host
    environment: *default-env
    volumes: *default-volumes
    entrypoint: ["/bin/bash", "-c",
      "source /opt/ros/jazzy/setup.bash \
    && source /opt/px4_msgs_ws/install/setup.bash \
    && ros2 launch /alerion_sim/launch/rviz.launch.py \"$@\"", "--"]

  # Interactive shell
  shell:
    image: alerion_sim:latest
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    environment: *default-env
    volumes: *default-volumes
    entrypoint: ["/bin/bash", "-c",
      "source /opt/ros/jazzy/setup.bash \
    && source /opt/px4_msgs_ws/install/setup.bash \
    && exec bash"]
    stdin_open: true
    tty: true

volumes:
  qgc_settings:
