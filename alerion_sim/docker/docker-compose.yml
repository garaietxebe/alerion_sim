# Usage
#   Full fidelity simulation (default)
#   docker compose run --rm sim level:=full
#
#   Development level with vision sensor profile
#   docker compose run --rm sim level:=development sensor_profile:=vision
#
#   Hard-vision profile (1280x720 + distortion + realistic gimbal)
#   docker compose run --rm sim level:=development sensor_profile:=hard_vision
#
#   Validation and compute load monitoring (run while sim is active)
#   docker compose run --rm validate
#
#   QGroundControl (run while sim is active, connects via MAVLink UDP 14550)
#   docker compose run --rm qgc
#
#   Interactive shell with the same environment
#   docker compose run --rm shell
#
# For GUI services (full / development / qgc) on Linux X11, run once before launching:
#   xhost +local:docker
#

# Shared environment (mapping format enables <<: merge key for per-service overrides)
x-env: &default-env
  DISPLAY: ${DISPLAY}
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  QT_QPA_PLATFORM: xcb
  GZ_VERSION: harmonic
  FASTRTPS_DEFAULT_PROFILES_FILE: /alerion_sim/docker/fastdds_localhost.xml

x-volumes: &default-volumes
  - ..:/alerion_sim
  - /tmp/.X11-unix:/tmp/.X11-unix
  - gz_logs:/root/.gz

services:

  # Main simulation service: Gazebo + PX4 SITL + bridges + controllers
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: alerion_sim:latest
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    environment:
      <<: *default-env
      # DRI_PRIME=1 selects the discrete AMD GPU; without it Gazebo may use llvmpipe
      DRI_PRIME: 1
    volumes: *default-volumes
    # AMD GPU passthrough; without this Gazebo falls back to software rendering (llvmpipe) at ~12% RTF
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"    # video
      - "992"   # render

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8G"

  # QGroundControl: connects to PX4 SITL via MAVLink UDP 14550 (auto-detected on host network)
  # Runs as qgcuser (non-root) to avoid the QGC root warning.
  qgc:
    image: alerion_sim:latest
    network_mode: host
    user: qgcuser
    environment:
      <<: *default-env
      DRI_PRIME: 1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - qgc_settings:/home/qgcuser/.config/QGroundControl.org
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"    # video
      - "992"   # render
    entrypoint: ["/opt/QGroundControl/AppRun"]

  # Validation and compute load monitoring service
  # Runs alongside the sim container; shares its PID namespace to probe gz-sim, px4,
  # MicroXRCEAgent, and bridge resource usage.
  validate:
    image: alerion_sim:latest
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    environment: *default-env
    volumes: *default-volumes
    entrypoint: ["/bin/bash", "-c",
      "source /opt/ros/jazzy/setup.bash \
    && source /opt/px4_msgs_ws/install/setup.bash \
    && ros2 launch /alerion_sim/launch/validation.launch.py \"$@\"", "--"]

  # Interactive shell
  shell:
    image: alerion_sim:latest
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    environment: *default-env
    volumes: *default-volumes
    entrypoint: ["/bin/bash", "-c",
      "source /opt/ros/jazzy/setup.bash \
    && source /opt/px4_msgs_ws/install/setup.bash \
    && exec bash"]
    stdin_open: true
    tty: true

volumes:
  gz_logs:
  qgc_settings:
